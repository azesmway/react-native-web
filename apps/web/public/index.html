$urlMain = 'https://a.onlinetur.ru';
$urlNews = 'https://zagrebon.com';
$urlChat = $urlMain . '/api/chat_v3/get_info_title.php?';
$urlChat0 = $urlChat;
$title = 'Клуб тревел-экспертов. Рейтинги отелей';
$image = '/images/logo_app.png';
$description = 'Рейтинги и прямое бронирование отелей. Клуб тревел-экспертов';

function curlChat($url)
{
    $ch = curl_init();
    $timeout = 5;
    curl_setopt($ch, CURLOPT_URL, $url);
    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
    curl_setopt($ch, CURLOPT_SSL_VERIFYHOST, false);
    curl_setopt($ch, CURLOPT_SSL_VERIFYPEER, false);
    curl_setopt($ch, CURLOPT_CONNECTTIMEOUT, $timeout);
    $output = curl_exec($ch);
    curl_close($ch);

    if ($output === false) {
        return null;
    }

    return json_decode($output, true);
}

function getData($uri)
{
    $result = [];
    global $urlMain, $urlNews, $urlChat, $urlChat0;

    if (strpos($uri, '/n/') !== false) {
        $request = explode('/', $_SERVER['REQUEST_URI']);
        $pos = strpos($request[2], '?');

        if (!$pos) {
            $pos = strpos($request[2], '#');
        }

        if ($pos) {
            $id = substr($request[2], 0, $pos);
        } else {
            $id = $request[2];
        }
        $url = $urlNews . '/i' . $id . '.json?u=';

        $article = curlChat($url);

        if (!$article) {
            return null;
        }

        if ($article['type'] === 1) {
            $title = $article['title'];
            $description = $article['short_description'];
            $image = !empty($article['content'][0]['array'][0]) ? $article['content'][0]['array'][0] : $article['cover_image'];
        } elseif ($article['type'] === 18 || $article['type'] === 9 || $article['type'] === 17) {
            $title = $article['title'];
            $description = $article['short_description'];

            for ($i = 0; $i < count($article['content']); $i++) {
                if ($article['content'][$i]['type'] === 'image') {
                    $image = !empty($article['content'][$i]['string']) ? $urlNews . $article['content'][$i]['string'] : '';
                    break;
                }
            }

            if (!$image) {
                $image = $article['cover_image'];
            }
        }
    } else {
        $geturl = str_replace("#", "/", str_replace("?", "/", $_SERVER['REQUEST_URI']));
        $request = explode('/', $geturl);

        foreach(array_keys($request) as $key)
        {
            if (empty($key) ) continue;

            if ($request[$key]=='y' && $key==1 && !empty($request[$key+1]))
            {
                $urlChat .= 'id_post='.intval($request[$key+1]).'&';
            } elseif ($request[$key]=='a' && $key==1 && !empty($request[$key+1])) {
                $urlChat .= 'id_post='.intval($request[$key+1]).'&';
            } elseif ($request[$key]=='h' && !empty($request[$key+1])) {
                $urlChat .= 'id_hotel=' . (intval($request[$key+1]) + 100000).'&';
            } elseif ($request[$key]=='p' && !empty($request[$key+1])) {
                $urlChat .= 'id_hotel=' . (intval($request[$key+1]) * -1 - 100000).'&';
            } elseif ($request[$key]=='b' && !empty($request[$key+1])) {
                $urlChat .= 'id_hobbi=' . intval($request[$key+1]).'&';
            } elseif ($request[$key]=='bonus' && $key==1) {
                $title .='Личные бонусы';
            } elseif ($request[$key]=='fav' && $key==1) {
                $title .='Мои заметки';
            } elseif ($request[$key]=='profile' && $key==1) {
                $title .='Настройки';
            } elseif ($request[$key]=='l' && $key==1) {
                $title .='Новости и обзоры';
            } elseif ($request[$key]=='r' && $key==1) {
                $title .='Рейтинги отелей';
            }

            if ($request[$key]=='a' && $urlChat) break;

        }

        if (empty($title) && $urlChat != $urlChat0 ) $chat = curlChat($urlChat);

        if ($chat['code'] === 0) {
            $title = !empty($chat['name_strana']) ? '' . $chat['name_strana'] : '';
            $title .= !empty($chat['name_hotel_kurrot']) ? '. ' . $chat['name_hotel_kurrot'] : '';
            $title .= !empty($chat['name_hobbi']) ? '. ' . $chat['name_hobbi'] : '';
            $title .= !empty($title) ? (empty($chat['business']) ?' (бизнес-чат)' : ' (чат)') : '';
            $description = $chat['description'];
        }
    }

    $result['title'] = $title;
    $result['image'] = $image;
    $result['description'] = $description;

    return $result;
}

$result = getData($_SERVER['REQUEST_URI']);

if (!empty($result['title'])) {
    $title = $result['title'];
    $image = $result['image'];
    $description = $result['description'];
} else {
    $title = 'Клуб тревел-экспертов. Рейтинги отелей';
    $image = '/images/logo_app.png';
    $description = 'Рейтинги и прямое бронирование отелей. Клуб тревел-экспертов';
}
